<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIBEL - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="assets/css/global.css" rel="stylesheet">
    <style>
        :root {
            --primary: #2ecc71;
            --primary-dark: #27ae60;
            --primary-light: #58d68d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            background: linear-gradient(135deg, #1a3d1a 0%, #145a32 50%, #0d3d1a 100%);
            font-family: 'Montserrat', sans-serif;
        }

        /* Left Side - Branding */
        .left-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            animation: fadeInLeft 0.8s ease-out;
        }

        @keyframes fadeInLeft {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .left-header {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-row {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .login-logo {
            font-family: 'Bebas Neue', sans-serif;
            color: white;
            font-size: 120px;
            letter-spacing: 10px;
            text-shadow: 0 4px 30px rgba(0,0,0,0.3);
        }

        .mascota-login {
            width: 150px;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.4));
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-25px); }
        }

        .left-subtitle {
            color: rgba(255,255,255,0.9);
            font-size: 22px;
            margin-top: 15px;
            letter-spacing: 2px;
        }

        /* Right Side - Form */
        .right-side {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            animation: fadeInRight 0.8s ease-out;
        }

        @keyframes fadeInRight {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .login-box {
            background: white;
            border-radius: 24px;
            padding: 50px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .login-title {
            color: #1a3d1a;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
            text-align: center;
        }

        .login-desc {
            color: #666;
            margin-bottom: 30px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #1a3d1a;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(46,204,113,0.15);
        }

        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .password-wrapper input {
            padding-right: 50px;
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            padding: 5px;
            opacity: 0.6;
            transition: opacity 0.3s;
        }

        .toggle-password:hover {
            opacity: 1;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .remember-me input {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
        }

        .remember-me label {
            color: #666;
            font-size: 14px;
        }

        .forgot-link {
            color: var(--primary);
            font-size: 14px;
            text-decoration: none;
            font-weight: 500;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        .login-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(46,204,113,0.35);
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .login-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 40px rgba(46,204,113,0.45);
        }

        .login-btn:hover::before {
            left: 100%;
        }

        .role-selector {
            text-align: center;
        }

        .role-selector label {
            display: block;
            color: #666;
            font-size: 13px;
            margin-bottom: 12px;
            font-weight: 500;
        }

        .role-options {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .role-btn {
            padding: 14px 24px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            background: white;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #666;
        }

        .role-btn:hover {
            border-color: var(--primary);
            background: rgba(46,204,113,0.05);
            transform: translateY(-2px);
        }

        .role-btn.active {
            border-color: var(--primary);
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            box-shadow: 0 4px 15px rgba(46,204,113,0.4);
            transform: scale(1.05);
        }

        .error-message {
            background: rgba(231,76,60,0.1);
            border: 1px solid #e74c3c;
            color: #e74c3c;
            padding: 14px 18px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
            animation: shake 0.5s ease-in-out;
        }

        .error-message.show {
            display: block;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        @media (max-width: 900px) {
            body { flex-direction: column; }
            .left-side { padding: 40px 20px; }
            .right-side { padding: 20px; }
            .login-box { padding: 30px; }
            .login-logo { font-size: 56px; }
            .role-options { flex-wrap: wrap; }
        }
    </style>
</head>
<body>
    <!-- Left Side: Branding -->
    <div class="left-side">
        <div class="left-header">
            <div class="header-row">
                <h1 class="login-logo">RIBEL</h1>
                <img src="assets/img/mascota.png" alt="Mascota" class="mascota-login">
            </div>
            <p class="left-subtitle">Sistema de Gestion Escolar</p>
        </div>
        
        
    </div>

    <!-- Right Side: Form -->
    <div class="right-side">
        <div class="login-box">
            <h2 class="login-title">Iniciar Sesión</h2>
            <p class="login-desc">Accede a tu cuenta institucional</p>

            <div class="error-message" id="errorMessage">
                Correo o contrasena incorrectos. Intenta de nuevo.
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Correo Institucional</label>
                    <input type="email" id="email" placeholder="24040123@RIBEL.MX" required>
                </div>

                <div class="form-group">
                    <label>Contraseña</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="********" required>
                        <button type="button" class="toggle-password" onclick="togglePassword()">
                            <span id="eyeIcon">🔒</span>
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <div class="remember-me">
                        <input type="checkbox" id="remember">
                        <label for="remember">Recordarme</label>
                    </div>
                    <a href="#" class="forgot-link">Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="login-btn">Iniciar Sesión</button>
            </form>

            <div class="role-selector">
                <label>Selecciona tu rol</label>
                <div class="role-options">
                    <button type="button" class="role-btn active" onclick="selectRole('admin', this)">Administrador</button>
                    <button type="button" class="role-btn" onclick="selectRole('docente', this)">Docente</button>
                    <button type="button" class="role-btn" onclick="selectRole('alumno', this)">Alumno</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedRole = 'admin';

        function selectRole(role, btn) {
            selectedRole = role;
            document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.textContent = '🔓';
            } else {
                passwordInput.type = 'password';
                eyeIcon.textContent = '🔒';
            }
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            if (email === '24040123@RIBEL.MX' && password === '24040123') {
                localStorage.setItem('loggedIn', 'true');
                localStorage.setItem('userEmail', email);
                localStorage.setItem('userRole', selectedRole);
                
                if (selectedRole === 'docente') {
                    window.location.href = 'domains/materias/materias.html';
                } else if (selectedRole === 'alumno') {
                    window.location.href = 'domains/alumnos/alumnos.html';
                } else {
                    window.location.href = 'domains/materias/materias.html';
                }
            } else {
                document.getElementById('errorMessage').classList.add('show');
            }
        });
        
        if (localStorage.getItem('loggedIn') === 'true') {
            window.location.href = 'domains/materias/materias.html';
        }
    </script>
</body>
</html>
